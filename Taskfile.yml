version: "3"

tasks:
  dns-check:
    desc: "DNS snapshot"
    cmds:
      - dig ns bcwlv.com +short
      - dig ns sublimedesignnv.com +short
      - dig a bcwlv.com +short
      - dig a www.bcwlv.com +short
      - dig a sublimedesignnv.com +short
      - dig cname www.sublimedesignnv.com +short
      - dig mx bcwlv.com +short
      - dig mx sublimedesignnv.com +short

  http-check:
    desc: "HTTP headers for bcwlv.com redirects"
    cmds:
      - echo "=== http://bcwlv.com ==="
      - curl -I http://bcwlv.com | head -n 25
      - echo "=== https://bcwlv.com ==="
      - curl -I https://bcwlv.com | head -n 25
      - echo "=== https://www.bcwlv.com ==="
      - curl -I https://www.bcwlv.com | head -n 25
